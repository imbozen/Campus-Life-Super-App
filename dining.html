<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dining</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark p-3">
  <a class="text-white" href="index.html">Home</a>
  <a class="text-white" href="dining.html">Dining</a>
  <a class="text-white" href="events.html">Events</a>
</nav>

<div class="container mt-4">

<h1 class="text-center">Dining Options</h1>

<!-- CATEGORY -->
<div class="text-center mb-3">
  <button class="btn btn-primary" onclick="showCategory('breakfast')">Breakfast</button>
  <button class="btn btn-primary" onclick="showCategory('lunch')">Lunch</button>
  <button class="btn btn-primary" onclick="showCategory('dinner')">Dinner</button>
  <button class="btn btn-secondary" onclick="showAll()">All</button>
</div>

<!-- FILTER -->
<div class="text-center mb-4">
  <button class="btn btn-success" onclick="filterDiet('vegan')">Vegan</button>
  <button class="btn btn-warning" onclick="filterDiet('gluten')">Gluten-Free</button>
</div>

<!-- MEALS -->
<div id="meal-container" class="row"></div>

<!-- ADD MEAL -->
<div class="mt-4 text-center">
  <h4>Suggest a Meal</h4>
  <input type="text" id="mealInput" class="form-control w-50 mx-auto mb-2">
  <button class="btn btn-dark" onclick="addMeal()">Submit</button>
</div>

<!-- API -->
<div class="mt-5 text-center">
  <h4>Meal Suggestions</h4>
  <button class="btn btn-info" onclick="loadMeals()">Load Meals</button>
  <div id="api-meals" class="row mt-3"></div>
</div>

</div>

<script src="js/script.js"></script>
</body>
</html>
